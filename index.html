<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FROG X Text Style Studio</title>
    <meta name="description" content="Premium Dark Glassmorphism Text Generator & Decorator">
    <meta name="theme-color" content="#07070c">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-base: #050508;
            --neon-purple: #8a2be2;
            --neon-blue: #00d2ff;
            --neon-pink: #ff007f;
            --glass-bg: rgba(18, 18, 28, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(255, 255, 255, 0.14);
            --text-main: #f3f4f6;
            --text-muted: #8e929f;
            --font-ui: 'Outfit', sans-serif;
            --font-code: 'Fira Code', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-ui);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Cyberpunk Glows */
        body::before, body::after {
            content: ''; position: fixed; width: 45vw; height: 45vw; border-radius: 50%; filter: blur(140px); z-index: -2; opacity: 0.15; pointer-events: none;
        }
        body::before { background: var(--neon-purple); top: -10%; left: -10%; }
        body::after { background: var(--neon-blue); bottom: -10%; right: -10%; }

        #canvas-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        /* App Layout */
        .app-shell { max-width: 1280px; margin: 0 auto; padding: 20px 16px 80px; }

        header {
            display: flex; justify-content: space-between; align-items: center; padding: 16px 24px;
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 20px; margin-bottom: 24px;
        }

        .brand { display: flex; align-items: center; gap: 12px; font-weight: 900; font-size: 1.4rem; letter-spacing: -0.5px; }
        .brand span { background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .badge { font-size: 0.65rem; background: rgba(138,43,226,0.2); border: 1px solid var(--neon-purple); padding: 3px 8px; border-radius: 20px; font-family: var(--font-code); color: var(--neon-blue); }

        .header-actions { display: flex; gap: 10px; }
        .btn-icon { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: var(--text-main); width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
        .btn-icon:hover { background: var(--glass-hover); border-color: var(--neon-blue); transform: translateY(-2px); }

        /* Hero Input Section */
        .hero-panel {
            background: var(--glass-bg); backdrop-filter: blur(24px); border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-bottom: 24px; position: sticky; top: 16px; z-index: 100;
        }

        .input-wrapper { position: relative; width: 100%; }
        textarea#mainInput {
            width: 100%; height: 90px; background: rgba(0,0,0,0.4); border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 16px; color: #fff; font-size: 1.35rem; font-family: var(--font-ui); font-weight: 600;
            resize: none; outline: none; transition: border-color 0.3s, box-shadow 0.3s;
        }
        textarea#mainInput:focus { border-color: var(--neon-purple); box-shadow: 0 0 25px rgba(138,43,226,0.25); }
        textarea#mainInput::placeholder { color: rgba(255,255,255,0.2); font-weight: 400; }

        .quick-toolbar { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; flex-wrap: wrap; gap: 10px; }
        .tools-left, .tools-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap;}
        
        .btn-sm {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); color: var(--text-muted);
            padding: 8px 14px; border-radius: 10px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .btn-sm:hover { color: #fff; background: rgba(255,255,255,0.12); }
        .btn-glow { background: linear-gradient(135deg, var(--neon-purple), #4a00e0); color: #fff; border: none; box-shadow: 0 4px 15px rgba(138,43,226,0.4); }
        .btn-glow:hover { box-shadow: 0 6px 20px rgba(138,43,226,0.6); transform: scale(1.02); }

        /* Navigation Tabs */
        .nav-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 20px; scrollbar-width: none; }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .tab {
            padding: 12px 20px; background: rgba(255,255,255,0.03); border: 1px solid transparent; border-radius: 14px;
            color: var(--text-muted); font-weight: 600; font-size: 0.95rem; white-space: nowrap; cursor: pointer; transition: all 0.2s;
        }
        .tab.active { background: rgba(138,43,226,0.15); border-color: var(--neon-purple); color: #fff; box-shadow: inset 0 0 12px rgba(138,43,226,0.3); }

        /* Filter & Search Bar */
        .filter-section { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .search-box { flex: 1; min-width: 240px; position: relative; }
        .search-box i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-box input {
            width: 100%; height: 46px; background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 14px; padding: 0 16px 0 44px; color: #fff; outline: none; font-family: var(--font-ui);
        }
        .search-box input:focus { border-color: var(--neon-blue); }

        .cat-pills { display: flex; gap: 6px; overflow-x: auto; width: 100%; padding-bottom: 6px; scrollbar-width: none; }
        .cat-pill { padding: 8px 16px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 20px; font-size: 0.8rem; color: var(--text-muted); cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .cat-pill.active { background: var(--text-main); color: #000; font-weight: 700; }

        /* Section Viewports */
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease; }

        /* Styles Grid */
        .styles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

        .style-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 18px; padding: 18px;
            position: relative; display: flex; flex-direction: column; justify-content: space-between; min-height: 110px;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; backdrop-filter: blur(16px);
        }
        .style-card:hover { transform: translateY(-3px); border-color: rgba(0, 210, 255, 0.4); box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        
        .card-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .style-name { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--neon-blue); font-weight: 700; }
        .card-actions { display: flex; gap: 6px; }
        .action-ico { color: var(--text-muted); cursor: pointer; font-size: 0.9rem; padding: 4px; transition: color 0.2s; }
        .action-ico:hover { color: #fff; }
        .action-ico.fav-active { color: var(--neon-pink); }

        .rendered-text { font-size: 1.25rem; word-break: break-all; color: #fff; flex-grow: 1; display: flex; align-items: center; font-family: var(--font-ui); }

        /* Symbols Grid */
        .symbols-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; }
        .sym-btn {
            height: 60px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 14px;
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; transition: 0.2s; color: #fff;
        }
        .sym-btn:hover { border-color: var(--neon-purple); transform: scale(1.1); background: rgba(138,43,226,0.2); }

        /* Tools View */
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .tool-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 24px; }
        .tool-card h3 { margin-bottom: 16px; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; color: var(--neon-blue); }
        .tool-field { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; color: #fff; margin-bottom: 12px; outline: none; }

        /* Toast & Modals */
        #toast {
            position: fixed; bottom: 24px; right: 24px; background: linear-gradient(135deg, #1e1e2f, #11111c);
            border: 1px solid var(--neon-blue); color: #fff; padding: 14px 22px; border-radius: 16px; font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; align-items: center; gap: 12px; z-index: 1000;
            transform: translateY(150%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #toast.show { transform: translateY(0); }

        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal { background: #0c0c14; border: 1px solid var(--neon-purple); border-radius: 24px; width: 100%; max-width: 500px; padding: 24px; text-align: center; }
        canvas#renderCanvas { width: 100%; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin: 16px 0; background: #050508; }

        /* Loading Splash */
        #splash {
            position: fixed; top:0; left:0; width:100%; height:100%; background: #050508; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease;
        }
        .loader-ring { width: 80px; height: 80px; border: 3px solid transparent; border-top-color: var(--neon-blue); border-bottom-color: var(--neon-purple); border-radius: 50%; animation: spin 1s linear infinite; }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 640px) {
            .hero-panel { padding: 16px; top: 8px; }
            textarea#mainInput { font-size: 1.15rem; height: 75px; }
            .styles-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="splash">
        <div class="loader-ring"></div>
        <h2 style="margin-top: 20px; font-weight: 800; letter-spacing: 4px; font-size: 0.9rem; color: var(--text-muted);">INITIALIZING FROG X ENGINE</h2>
    </div>

    <canvas id="canvas-bg"></canvas>

    <div class="app-shell">
        <header>
            <div class="brand">
                <i class="fa-solid fa-layer-group" style="color: var(--neon-purple);"></i>
                <div>FROG X <span>STUDIO</span></div>
                <div class="badge">PRO v1.2</div>
            </div>
            <div class="header-actions">
                <button class="btn-icon" id="installPWA" title="Install Offline App" style="display:none;"><i class="fa-solid fa-download"></i></button>
            </div>
        </header>

        <section class="hero-panel">
            <div class="input-wrapper">
                <textarea id="mainInput" placeholder="Type anything to stylize..." autofocus></textarea>
            </div>
            <div class="quick-toolbar">
                <div class="tools-left">
                    <button class="btn-sm" onclick="clearText()"><i class="fa-solid fa-rotate-left"></i> Clear</button>
                    <button class="btn-sm" onclick="pasteText()"><i class="fa-regular fa-clipboard"></i> Paste</button>
                    <button class="btn-sm" onclick="insertInvisible()"><i class="fa-solid fa-ghost"></i> Blank Char</button>
                </div>
                <div class="tools-right">
                    <button class="btn-sm btn-glow" onclick="randomizeText()"><i class="fa-solid fa-wand-magic-sparkles"></i> Lucky Style</button>
                </div>
            </div>
        </section>

        <nav class="nav-tabs">
            <div class="tab active" onclick="switchTab('styles')"><i class="fa-solid fa-wand-magic-sparkles"></i> Generator (160+)</div>
            <div class="tab" onclick="switchTab('symbols')"><i class="fa-solid fa-omega"></i> Unicode Library</div>
            <div class="tab" onclick="switchTab('tools')"><i class="fa-solid fa-toolbox"></i> Mini Tools</div>
            <div class="tab" onclick="switchTab('favs')"><i class="fa-solid fa-heart"></i> Favorites (<span id="favCount">0</span>)</div>
        </nav>

        <div id="view-styles" class="view-section active">
            <div class="filter-section">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchStyles" placeholder="Search by name or tag (e.g. sigma, gothic, tiktok)...">
                </div>
            </div>
            <div class="cat-pills" id="categoryPills">
                </div>
            <div style="margin: 16px 0 8px; font-size: 0.8rem; color: var(--text-muted); font-weight: 600;" id="resultsMeta">Showing all styles</div>
            <div class="styles-grid" id="stylesGrid"></div>
        </div>

        <div id="view-symbols" class="view-section">
            <div class="cat-pills" id="symCategories" style="margin-bottom:16px;"></div>
            <div class="symbols-grid" id="symbolsGrid"></div>
        </div>

        <div id="view-tools" class="view-section">
            <div class="tools-grid">
                <div class="tool-card">
                    <h3><i class="fa-solid fa-copy"></i> Text Repeater</h3>
                    <input type="text" id="repText" class="tool-field" placeholder="Text to repeat...">
                    <input type="number" id="repCount" class="tool-field" placeholder="Count (e.g. 50)" min="1" max="1000" value="10">
                    <label style="display:flex; align-items:center; gap:8px; font-size:0.85rem; color:var(--text-muted); margin-bottom:12px;">
                        <input type="checkbox" id="repNewline" checked> Put on new lines
                    </label>
                    <button class="btn-sm btn-glow" style="width:100%; justify-content:center;" onclick="runRepeater()">Generate & Copy</button>
                </div>

                <div class="tool-card">
                    <h3><i class="fa-solid fa-font"></i> Case Manipulator</h3>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                        <button class="btn-sm" onclick="convertCase('upper')">UPPERCASE</button>
                        <button class="btn-sm" onclick="convertCase('lower')">lowercase</button>
                        <button class="btn-sm" onclick="convertCase('title')">Title Case</button>
                        <button class="btn-sm" onclick="convertCase('alt')">aLtErNaTiNg</button>
                        <button class="btn-sm" style="grid-column: span 2;" onclick="convertCase('inv')">iNVERSE cASE</button>
                    </div>
                </div>

                <div class="tool-card">
                    <h3><i class="fa-solid fa-pen-nib"></i> Custom Wing Builder</h3>
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="wingLeft" class="tool-field" value="꧁༒•" placeholder="Left">
                        <input type="text" id="wingRight" class="tool-field" value="•༒꧂" placeholder="Right">
                    </div>
                    <button class="btn-sm btn-glow" style="width:100%; justify-content:center;" onclick="applyCustomWings()">Apply to Live Text</button>
                </div>
            </div>
        </div>

        <div id="view-favs" class="view-section">
            <div class="styles-grid" id="favsGrid"></div>
        </div>
    </div>

    <div id="toast"><i class="fa-solid fa-circle-check" style="color:var(--neon-blue)"></i> <span id="toastMsg">Copied to clipboard</span></div>

    <div class="modal-overlay" id="exportModal">
        <div class="modal">
            <h3 style="margin-bottom:8px;">Export High-Res Card</h3>
            <p style="font-size:0.8rem; color:var(--text-muted)">Rendered natively via Canvas API</p>
            <canvas id="renderCanvas" width="800" height="400"></canvas>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button class="btn-sm" onclick="closeModal()">Cancel</button>
                <button class="btn-sm btn-glow" onclick="downloadCanvas()">Download PNG</button>
            </div>
        </div>
    </div>

    <script>
        /* --- 1. CORE UNICODE GENERATOR ENGINE --- */
        // Safe 4-byte surrogate character arrays
        const CHARS_NORMAL = [...'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'];
        
        const ALPHABETS = {

            boldScript:  [...'𝓪𝓫𝓬𝓭𝓮𝓯𝓰𝓱𝓲𝓳𝓴𝓵𝓶𝓷𝓸𝓹𝓺𝓻𝓼𝓽𝓾𝓿𝔀𝔁𝔂𝔃𝓐𝓑𝓒𝓓𝓔𝓕𝓖𝓗𝓘𝓙𝓚𝓛𝓜𝓝𝓞𝓟𝓠𝓡𝓢𝓣𝓤𝓥𝓦𝓧𝓨𝓩0123456789'],
